<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base de Datos del Fútbol Argentino</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #0a0a2e; color: white; }
  header { background: #1a1a4e; padding: 20px; text-align: center; border-bottom: 3px solid #75AADB; }
  header h1 { color: #75AADB; font-size: 24px; }
  header p { color: #aaa; font-size: 14px; margin-top: 5px; }
  .buscador { padding: 20px; background: #111133; }
  .buscador input, .buscador select { 
    padding: 10px; margin: 5px; border-radius: 8px; 
    border: 1px solid #75AADB; background: #0a0a2e; 
    color: white; font-size: 14px; width: calc(50% - 12px);
  }
  .buscador input { width: calc(100% - 10px); margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th { background: #1a1a4e; color: #75AADB; padding: 12px 8px; text-align: left; font-size: 13px; }
  td { padding: 10px 8px; border-bottom: 1px solid #222244; font-size: 13px; }
  tr:hover { background: #111133; }
  .resultado { text-align: center; font-weight: bold; font-size: 16px; color: #75AADB; }
  .loading { text-align: center; padding: 40px; color: #75AADB; }
  .stats { display: flex; justify-content: center; gap: 20px; padding: 15px; background: #111133; flex-wrap: wrap; }
  .stat-box { background: #1a1a4e; padding: 15px 25px; border-radius: 10px; text-align: center; border: 1px solid #75AADB; }
  .stat-box span { display: block; font-size: 28px; font-weight: bold; color: #75AADB; }
  .stat-box p { font-size: 12px; color: #aaa; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <h1>⚽ Base de Datos del Fútbol Argentino</h1>
  <p>El historial más completo del fútbol argentino</p>
</header>

<div class="stats">
  <div class="stat-box"><span id="total-partidos">-</span><p>Partidos</p></div>
  <div class="stat-box"><span id="total-equipos">-</span><p>Equipos</p></div>
  <div class="stat-box"><span id="total-temporadas">-</span><p>Temporadas</p></div>
</div>

<div id="stats-equipo" style="display:none; margin:20px; padding:20px; background:#1a1a4e; border-radius:12px; border:1px solid #75AADB;">
  <h2 id="stats-nombre" style="color:#75AADB; margin-bottom:15px; text-align:center;"></h2>
  <div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap;">
    <div style="background:#0a0a2e; padding:15px 20px; border-radius:10px; text-align:center; min-width:80px;">
      <span id="stats-pj" style="display:block; font-size:28px; font-weight:bold; color:#75AADB;">0</span>
      <p style="color:#aaa; font-size:12px;">PJ</p>
    </div>
    <div style="background:#0a0a2e; padding:15px 20px; border-radius:10px; text-align:center; min-width:80px;">
      <span id="stats-pg" style="display:block; font-size:28px; font-weight:bold; color:#27AE60;">0</span>
      <p style="color:#aaa; font-size:12px;">PG</p>
    </div>
    <div style="background:#0a0a2e; padding:15px 20px; border-radius:10px; text-align:center; min-width:80px;">
      <span id="stats-pe" style="display:block; font-size:28px; font-weight:bold; color:#F39C12;">0</span>
      <p style="color:#aaa; font-size:12px;">PE</p>
    </div>
    <div style="background:#0a0a2e; padding:15px 20px; border-radius:10px; text-align:center; min-width:80px;">
      <span id="stats-pp" style="display:block; font-size:28px; font-weight:bold; color:#E74C3C;">0</span>
      <p style="color:#aaa; font-size:12px;">PP</p>
    </div>
    <div style="background:#0a0a2e; padding:15px 20px; border-radius:10px; text-align:center; min-width:80px;">
      <span id="stats-gf" style="display:block; font-size:28px; font-weight:bold; color:#75AADB;">0</span>
      <p style="color:#aaa; font-size:12px;">GF</p>
    </div>
    <div style="background:#0a0a2e; padding:15px 20px; border-radius:10px; text-align:center; min-width:80px;">
      <span id="stats-gc" style="display:block; font-size:28px; font-weight:bold; color:#75AADB;">0</span>
      <p style="color:#aaa; font-size:12px;">GC</p>
    </div>
    <div style="background:#0a0a2e; padding:15px 20px; border-radius:10px; text-align:center; min-width:80px;">
      <span id="stats-dg" style="display:block; font-size:28px; font-weight:bold; color:#75AADB;">0</span>
      <p style="color:#aaa; font-size:12px;">DG</p>
    </div>
  </div>
</div>
<div class="buscador">
  <input type="text" id="buscar" placeholder="🔍 Buscar equipo..." oninput="filtrar()">
  <select id="filtro-equipo" onchange="filtrar()">
    <option value="">Todos los equipos</option>
  </select>
 <select id="filtro-equipo2" onchange="filtrar()">
  <option value="">Contra cualquier equipo</option>
</select>
  <select id="filtro-resultado" onchange="filtrar()">
    <option value="">Todos los resultados</option>
    <option value="local">Victorias local</option>
    <option value="visitante">Victorias visitante</option>
    <option value="empate">Empates</option>
  </select>
  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Local</th>
        <th>Resultado</th>
        <th>Visitante</th>
        <th>Competencia</th>
      </tr>
    </thead>
    <tbody id="tabla-partidos">
      <tr><td colspan="5" class="loading">Cargando partidos...</td></tr>
    </tbody>
  </table>
</div>

<script>
const URL_PARTIDOS = 'Partidos.csv';
const ESCUDOS = {
  'Aldosivi': 'escudos/aldosivi.png',
  'All Boys': 'escudos/all_boys.png',
  'Almagro': 'escudos/almagro.png',
  'Argentinos Juniors': 'escudos/argentinos_juniors.png',
  'Arsenal': 'escudos/arsenal.png',
  'Atletico Rafaela': 'escudos/atletico_rafaela.png',
  'Atletico Tucuman': 'escudos/atletico_tucuman.png',
  'Banfield': 'escudos/banfield.png',
  'Barracas Central': 'escudos/barracas_central.png',
  'Belgrano': 'escudos/belgrano.png',
  'Boca Juniors': 'escudos/boca_juniors.png',
  'Central Cordoba SdE': 'escudos/central_cordoba_sde.png',
  'Chacarita Juniors': 'escudos/chacarita_juniors.png',
  'Colon': 'escudos/colon.png',
  'Crucero del Norte': 'escudos/crucero_del_norte.png',
  'Defensa y Justicia': 'escudos/defensa_y_justicia.png',
  'Deportivo Riestra': 'escudos/deportivo_riestra.png',
  'Estudiantes LP': 'escudos/estudiantes_lp.png',
  'Gimnasia de Jujuy': 'escudos/gimnasia_jujuy.png',
  'Gimnasia LP': 'escudos/gimnasia_lp.png',
  'Godoy Cruz': 'escudos/godoy_cruz.png',
  'Huracan': 'escudos/huracan.png',
  'Huracan de Tres Arroyos': 'escudos/huracan_tres_arroyos.png',
  'Independiente': 'escudos/independiente.png',
  'Independiente Rivadavia': 'escudos/independiente_rivadavia.png',
  'Instituto': 'escudos/instituto.png',
  'Lanus': 'escudos/lanus.png',
  'Newells': 'escudos/newells.png',
  'Nueva Chicago': 'escudos/nueva_chicago.png',
  'Olimpo': 'escudos/olimpo.png',
  'Patronato': 'escudos/patronato.png',
  'Platense': 'escudos/platense.png',
  'Quilmes': 'escudos/quilmes.png',
  'Racing Club': 'escudos/racing_club.png',
  'River Plate': 'escudos/river_plate.png',
  'Rosario Central': 'escudos/rosario_central.png',
  'San Lorenzo': 'escudos/san_lorenzo.png',
  'San Martin SJ': 'escudos/san_martin_sj.png',
  'San Martin Tucuman': 'escudos/san_martin_tucuman.png',
  'Sarmiento': 'escudos/sarmiento.png',
  'Talleres': 'escudos/talleres.png',
  'Temperley': 'escudos/temperley.png',
  'Tigre': 'escudos/tigre.png',
  'Tiro Federal': 'escudos/tiro_federal.png',
  'Union': 'escudos/union.png',
  'Velez Sarsfield': 'escudos/velez_sarsfield.png'
};
const URL_EQUIPOS = 'Equipos.csv';
let partidos = [];
let equipos = {};
let temporadas = {};

function csvToArray(csv) {
  const lines = csv.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  });
}

async function cargarDatos() {
  try {
    const [resP, resE] = await Promise.all([
      fetch(URL_PARTIDOS),
      fetch(URL_EQUIPOS)
    ]);
    const csvP = await resP.text();
    const csvE = await resE.text();

    const equiposArr = csvToArray(csvE);
    equiposArr.forEach(e => equipos[e.ID_Equipo] = e.Nombre_Equipo);

    partidos = csvToArray(csvP).filter(p => p.ID_Partido);

    document.getElementById('total-partidos').textContent = partidos.length.toLocaleString();
    document.getElementById('total-equipos').textContent = equiposArr.length;

    const selectEquipo = document.getElementById('filtro-equipo');
    equiposArr.sort((a,b) => a.Nombre_Equipo.localeCompare(b.Nombre_Equipo))
      .forEach(e => {
       const selectEquipo2 = document.getElementById('filtro-equipo2');
equiposArr.sort((a,b) => a.Nombre_Equipo.localeCompare(b.Nombre_Equipo))
  .forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.ID_Equipo;
    opt.textContent = e.Nombre_Equipo;
    selectEquipo2.appendChild(opt);
  });
        const opt = document.createElement('option');
        opt.value = e.ID_Equipo;
        opt.textContent = e.Nombre_Equipo;
        selectEquipo.appendChild(opt);
      });

    filtrar();
  } catch(e) {
    document.getElementById('tabla-partidos').innerHTML = 
      '<tr><td colspan="5" class="loading">Error cargando datos. Revisá las URLs.</td></tr>';
  }
}

function filtrar() {const equipoSeleccionado = document.getElementById('filtro-equipo').value;
  if (equipoSeleccionado) {
    const nombreEquipo = equipos[equipoSeleccionado];
    const partEquipo = partidos.filter(p => p.Local_ID === equipoSeleccionado || p.Visitante_ID === equipoSeleccionado);
    const pj = partEquipo.length;
    const pg = partEquipo.filter(p => p.Tipo_Definicion === '0' && p.ID_Ganador === equipoSeleccionado).length;
    const pp = partEquipo.filter(p => p.Tipo_Definicion === '0' && p.ID_Ganador !== equipoSeleccionado && p.ID_Ganador !== '').length;
    const pe = pj - pg - pp;
    const gf = partEquipo.reduce((acc, p) => acc + (p.Local_ID === equipoSeleccionado ? parseInt(p.Goles_Local)||0 : parseInt(p.Goles_Visitante)||0), 0);
    const gc = partEquipo.reduce((acc, p) => acc + (p.Local_ID === equipoSeleccionado ? parseInt(p.Goles_Visitante)||0 : parseInt(p.Goles_Local)||0), 0);
    document.getElementById('stats-equipo').style.display = 'block';
    document.getElementById('stats-nombre').textContent = nombreEquipo;
    document.getElementById('stats-pj').textContent = pj;
    document.getElementById('stats-pg').textContent = pg;
    document.getElementById('stats-pe').textContent = pe;
    document.getElementById('stats-pp').textContent = pp;
    document.getElementById('stats-gf').textContent = gf;
    document.getElementById('stats-gc').textContent = gc;
    document.getElementById('stats-dg').textContent = gf - gc;
  } else {
    document.getElementById('stats-equipo').style.display = 'none';
  }
  const buscar = document.getElementById('buscar').value.toLowerCase();
  const equipoFiltro = document.getElementById('filtro-equipo').value;
  const resultadoFiltro = document.getElementById('filtro-resultado').value;

  let filtrados = partidos.filter(p => {
    const nombreLocal = (equipos[p.Local_ID] || '').toLowerCase();
    const nombreVisitante = (equipos[p.Visitante_ID] || '').toLowerCase();

    const coincideBuscar = !buscar || nombreLocal.includes(buscar) || nombreVisitante.includes(buscar);
    const equipo2 = document.getElementById('filtro-equipo2').value;
const coincideEquipo = !equipoFiltro || p.Local_ID === equipoFiltro || p.Visitante_ID === equipoFiltro;
const coincideEnfrentamiento = !equipo2 || !equipoFiltro ||
  (p.Local_ID === equipoFiltro && p.Visitante_ID === equipo2) ||
  (p.Local_ID === equipo2 && p.Visitante_ID === equipoFiltro);

    let coincideResultado = true;
    if (resultadoFiltro === 'local') coincideResultado = parseInt(p.Goles_Local) > parseInt(p.Goles_Visitante);
    if (resultadoFiltro === 'visitante') coincideResultado = parseInt(p.Goles_Visitante) > parseInt(p.Goles_Local);
    if (resultadoFiltro === 'empate') coincideResultado = p.Goles_Local === p.Goles_Visitante;

    return coincideBuscar && coincideEquipo && coincideResultado && coincideEnfrentamiento;
  });

  const tbody = document.getElementById('tabla-partidos');

  if (filtrados.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="loading">No se encontraron partidos.</td></tr>';
    return;
  }

tbody.innerHTML = filtrados.slice(0, 200).map(p => {
    const local = equipos[p.Local_ID] || p.Local_ID;
    const visitante = equipos[p.Visitante_ID] || p.Visitante_ID;
    const fecha = p.Fecha ? p.Fecha.split('T')[0] : '';
    const escLocal = ESCUDOS[local] ? `<img src="${ESCUDOS[local]}" style="width:24px;height:24px;object-fit:contain;margin-right:6px;vertical-align:middle;">` : '';
    const escVisitante = ESCUDOS[visitante] ? `<img src="${ESCUDOS[visitante]}" style="width:24px;height:24px;object-fit:contain;margin-left:6px;vertical-align:middle;">` : '';
    return `<tr>
      <td>${fecha}</td>
      <td>${escLocal}${local}</td>
      <td class="resultado">${p.Goles_Local} - ${p.Goles_Visitante}</td>
      <td>${visitante}${escVisitante}</td>
      <td>${p.Fase || ''}</td>
    </tr>`;
  }).join('');
}

cargarDatos();
</script>
</body>
</html>
