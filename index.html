<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base de Datos del Fútbol Argentino</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #0a0a2e; color: white; }
  header { background: #1a1a4e; padding: 20px; text-align: center; border-bottom: 3px solid #75AADB; }
  header h1 { color: #75AADB; font-size: 24px; }
  header p { color: #aaa; font-size: 14px; margin-top: 5px; }
  .buscador { padding: 20px; background: #111133; }
  .buscador input, .buscador select { 
    padding: 10px; margin: 5px; border-radius: 8px; 
    border: 1px solid #75AADB; background: #0a0a2e; 
    color: white; font-size: 14px; width: calc(50% - 12px);
  }
  .buscador input { width: calc(100% - 10px); margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th { background: #1a1a4e; color: #75AADB; padding: 12px 8px; text-align: left; font-size: 13px; }
  td { padding: 10px 8px; border-bottom: 1px solid #222244; font-size: 13px; }
  tr:hover { background: #111133; }
  .resultado { text-align: center; font-weight: bold; font-size: 16px; color: #75AADB; }
  .loading { text-align: center; padding: 40px; color: #75AADB; }
  .stats { display: flex; justify-content: center; gap: 20px; padding: 15px; background: #111133; flex-wrap: wrap; }
  .stat-box { background: #1a1a4e; padding: 15px 25px; border-radius: 10px; text-align: center; border: 1px solid #75AADB; }
  .stat-box span { display: block; font-size: 28px; font-weight: bold; color: #75AADB; }
  .stat-box p { font-size: 12px; color: #aaa; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <h1>⚽ Base de Datos del Fútbol Argentino</h1>
  <p>El historial más completo del fútbol argentino</p>
</header>

<div class="stats">
  <div class="stat-box"><span id="total-partidos">-</span><p>Partidos</p></div>
  <div class="stat-box"><span id="total-equipos">-</span><p>Equipos</p></div>
  <div class="stat-box"><span id="total-temporadas">-</span><p>Temporadas</p></div>
</div>

<div class="buscador">
  <input type="text" id="buscar" placeholder="🔍 Buscar equipo..." oninput="filtrar()">
  <select id="filtro-equipo" onchange="filtrar()">
    <option value="">Todos los equipos</option>
  </select>
  <select id="filtro-resultado" onchange="filtrar()">
    <option value="">Todos los resultados</option>
    <option value="local">Victorias local</option>
    <option value="visitante">Victorias visitante</option>
    <option value="empate">Empates</option>
  </select>
  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Local</th>
        <th>Resultado</th>
        <th>Visitante</th>
        <th>Competencia</th>
      </tr>
    </thead>
    <tbody id="tabla-partidos">
      <tr><td colspan="5" class="loading">Cargando partidos...</td></tr>
    </tbody>
  </table>
</div>

<script>
const URL_PARTIDOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRVYKDR28UDeXro5XXk0FT_keK42BY9bFywYoGZydA3Z7gyEMvHSbR7K0kgE0_vhSj2w-UnOqRgY9SN/pub?gid=1678633243&single=true&output=csv
';
const URL_EQUIPOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRVYKDR28UDeXro5XXk0FT_keK42BY9bFywYoGZydA3Z7gyEMvHSbR7K0kgE0_vhSj2w-UnOqRgY9SN/pub?gid=1077822167&single=true&output=csv';

let partidos = [];
let equipos = {};
let temporadas = {};

function csvToArray(csv) {
  const lines = csv.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  });
}

async function cargarDatos() {
  try {
    const [resP, resE] = await Promise.all([
      fetch(URL_PARTIDOS),
      fetch(URL_EQUIPOS)
    ]);
    const csvP = await resP.text();
    const csvE = await resE.text();

    const equiposArr = csvToArray(csvE);
    equiposArr.forEach(e => equipos[e.ID_Equipo] = e.Nombre_Equipo);

    partidos = csvToArray(csvP).filter(p => p.ID_Partido);

    document.getElementById('total-partidos').textContent = partidos.length.toLocaleString();
    document.getElementById('total-equipos').textContent = equiposArr.length;

    const selectEquipo = document.getElementById('filtro-equipo');
    equiposArr.sort((a,b) => a.Nombre_Equipo.localeCompare(b.Nombre_Equipo))
      .forEach(e => {
        const opt = document.createElement('option');
        opt.value = e.ID_Equipo;
        opt.textContent = e.Nombre_Equipo;
        selectEquipo.appendChild(opt);
      });

    filtrar();
  } catch(e) {
    document.getElementById('tabla-partidos').innerHTML = 
      '<tr><td colspan="5" class="loading">Error cargando datos. Revisá las URLs.</td></tr>';
  }
}

function filtrar() {
  const buscar = document.getElementById('buscar').value.toLowerCase();
  const equipoFiltro = document.getElementById('filtro-equipo').value;
  const resultadoFiltro = document.getElementById('filtro-resultado').value;

  let filtrados = partidos.filter(p => {
    const nombreLocal = (equipos[p.Local_ID] || '').toLowerCase();
    const nombreVisitante = (equipos[p.Visitante_ID] || '').toLowerCase();

    const coincideBuscar = !buscar || nombreLocal.includes(buscar) || nombreVisitante.includes(buscar);
    const coincideEquipo = !equipoFiltro || p.Local_ID === equipoFiltro || p.Visitante_ID === equipoFiltro;

    let coincideResultado = true;
    if (resultadoFiltro === 'local') coincideResultado = parseInt(p.Goles_Local) > parseInt(p.Goles_Visitante);
    if (resultadoFiltro === 'visitante') coincideResultado = parseInt(p.Goles_Visitante) > parseInt(p.Goles_Local);
    if (resultadoFiltro === 'empate') coincideResultado = p.Goles_Local === p.Goles_Visitante;

    return coincideBuscar && coincideEquipo && coincideResultado;
  });

  const tbody = document.getElementById('tabla-partidos');

  if (filtrados.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="loading">No se encontraron partidos.</td></tr>';
    return;
  }

  tbody.innerHTML = filtrados.slice(0, 200).map(p => {
    const local = equipos[p.Local_ID] || p.Local_ID;
    const visitante = equipos[p.Visitante_ID] || p.Visitante_ID;
    const fecha = p.Fecha ? p.Fecha.split('T')[0] : '';
    return `<tr>
      <td>${fecha}</td>
      <td>${local}</td>
      <td class="resultado">${p.Goles_Local} - ${p.Goles_Visitante}</td>
      <td>${visitante}</td>
      <td>${p.Fase || ''}</td>
    </tr>`;
  }).join('');
}

cargarDatos();
</script>
</body>
</html>
